server {
    server_name who-a.com www.who-a.com;

    client_max_body_size 50M;

    # ── 압축 (gzip)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        font/ttf
        font/otf
        image/svg+xml;

    # ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/who-a;
    }

    # frontend SPA
    root /var/www/who-a;
    index index.html;

    # 빌드된 정적 자원: 파일명에 해시가 들어있으므로 1년 immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # 폰트: 자주 안 바뀜
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        try_files $uri =404;
    }

    # 이미지/미디어
    location ~* \.(png|jpg|jpeg|gif|webp|svg|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location / {
        # index.html은 캐시 금지 (배포 즉시 반영)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Spring Boot API
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    # uploads (Spring serves /uploads)
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # FastAPI analytics
    location /analytics/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    listen [::]:443 ssl http2 ipv6only=on; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/who-a.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/who-a.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.who-a.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    if ($host = who-a.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    listen 80;
    listen [::]:80;
    server_name who-a.com www.who-a.com;
    return 404; # managed by Certbot
}
