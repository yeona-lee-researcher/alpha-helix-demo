# =====================================================================
# Docker 자동배포 프로파일 (--spring.profiles.active=docker)
# prod 유사하되 컨테이너 단독 기동이 쉽도록:
#  - ddl-auto=update : 빈 MySQL 컨테이너에서 엔티티로 전체 스키마 자동 생성(스키마 덤프 import 불필요)
#  - Flyway off      : update 와 충돌 방지 (운영 prod 프로파일은 validate+flyway)
#  - 시크릿은 .env 로 주입 권장. 미설정이면 base application.properties 의 dev 기본값으로라도 기동(자가호스팅).
# =====================================================================

# DB — compose 의 db 서비스. mysql8 컨테이너 접속 플래그 포함.
spring.datasource.url=jdbc:mysql://${DB_HOST:db}:${DB_PORT:3306}/${DB_NAME:alphahelix_db}?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:alpha}
spring.datasource.password=${DB_PASSWORD:alphapw}

# 빈 DB 자동 스키마 + Flyway 비활성
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# 헬스: 메일 미설정으로 인한 DOWN 방지(컨테이너 healthcheck 안정화)
management.endpoints.web.exposure.include=health
management.health.mail.enabled=false
management.endpoint.health.show-details=never

# Analytics 사이드카 (compose 의 analytics 서비스)
app.analytics.base-url=${ANALYTICS_BASE_URL:http://analytics:8001}
app.analytics.internal-token=${ANALYTICS_INTERNAL_TOKEN:dev-internal-token-change-me}

# Claude Code 에이전트 — 이미지에 claude CLI 포함. BYOK(사용자 본인 키)로 동작.
app.claude.cli.enabled=${CLAUDE_CLI_ENABLED:true}
app.claude.cli.path=${CLAUDE_CLI_PATH:claude}

# Developer Studio 상시 허용 이메일(콤마). 그 외엔 STANDARD/PREMIUM 구독자.
app.access.developer-allowlist=${DEVELOPER_ALLOWLIST:}

# 컨테이너는 HTTP(80) 뒤에서 동작 — secure 쿠키 비활성(앞단 HTTPS/ALB 붙이면 CORS_ALLOWED_ORIGINS 로 제어)
app.cookie.secure=false
app.cookie.same-site=Lax
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# 비핵심 시크릿 안전 fallback(미설정이어도 부팅) — 실제 기능엔 .env 로 주입 필요
app.approval.hmac-secret=${APPROVAL_HMAC_SECRET:docker-dev-approval-hmac-change-me}
tosspayments.webhook-secret=${TOSS_WEBHOOK_SECRET:}
upload.dir=${UPLOAD_DIR:/var/devbridge/uploads}
app.upload.dir=${UPLOAD_DIR:/var/devbridge/uploads}
