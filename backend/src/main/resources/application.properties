spring.application.name=alpha helix

# 기본 프로파일을 local 로 (CLI 인자/환경변수로 명시되지 않은 경우).
# - 운영: --spring.profiles.active=prod 또는 SPRING_PROFILES_ACTIVE=prod 로 덮어쓰기
# - 로컬 개발: application-local.properties 의 키들이 자동 적용됨
spring.profiles.default=local

# Server port
server.port=9091

# 로컬 전용 터미널(WebSocket /ws/terminal). 보안상 운영 기본 OFF. 로컬 개발에서만 켠다.
# (켜져도 핸들러가 loopback 접속만 허용)
app.terminal.enabled=${TERMINAL_ENABLED:false}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:alphahelix_db}?serverTimezone=Asia/Seoul
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# SQL 로깅은 디버그 시에만 켜라. 1000+ row 시드/N+1 쿼리 시 콘솔 IO 가 응답을 수초~수십초 지연시킴.
# 디버그 필요시: --spring.jpa.show-sql=true --spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Hikari 풀 사이즈 — 동시 요청 처리량 향상
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
# Spring Boot 기본 로그 레벨에서 hibernate 노이즈 제거
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Gemini API (환경변수 GEMINI_API_KEY 설정 필수)
gemini.api.key=${GEMINI_API_KEY:}
# 메인: 빠른 응답을 위한 2.5-flash (대화/JSON 추출 등 일반 작업에 충분)
# 폴백: 429 시 gemini-2.0-flash (무료 티어 1,500 RPD — 2.5-flash 무료 20 RPD 소진 시 자동 전환)
gemini.api.model=gemini-2.5-flash
gemini.api.fallback-model=gemini-2.0-flash
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models

# 추가 LLM 프로바이더 (선택사항) — 키 없으면 UI에서 비활성화 표시
anthropic.api.key=${ANTHROPIC_API_KEY:}
openai.api.key=${OPENAI_API_KEY:}
perplexity.api.key=${PERPLEXITY_API_KEY:}

#Chat Stream API (환경변수 STREAM_CHAT_API_KEY, STREAM_CHAT_API_SECRET 설정 필수)
stream.chat.api-key=${STREAM_CHAT_API_KEY:}
stream.chat.api-secret=${STREAM_CHAT_API_SECRET:}

# JWT
app.jwt.secret=${JWT_SECRET:dev-bridge-default-secret-key-change-in-production-please-32bytes}
app.jwt.ttl-hours=1
app.jwt.refresh-ttl-days=15

# Auth cookie (HttpOnly JWT). 운영(HTTPS)에선 prod 프로파일에서 secure=true로 오버라이드.
app.cookie.secure=false
app.cookie.same-site=Lax

# Mail (Gmail SMTP) - 환경변수 MAIL_USERNAME, MAIL_PASSWORD 필요
# MAIL_PASSWORD는 Gmail 일반 비번이 아니라 "앱 비밀번호"여야 함 (https://myaccount.google.com/apppasswords)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# 인증 코드 만료 (분)
app.verify.code-ttl-minutes=5

# File upload (Multipart)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# 업로드 파일 저장 경로 (절대경로 또는 상대경로). 기본: backend/uploads/
app.upload.dir=${UPLOAD_DIR:uploads}
# 정적 서빙 URL 프리픽스 (이 prefix 뒤로 파일이 노출됨)
app.upload.public-base=/files

# ───── KIS Broker 연동 ─────
# Base64로 인코딩된 32바이트(=44자) AES-GCM 키. 반드시 환경변수로만 주입.
# 생성: openssl rand -base64 32
# APP_CRYPTO_KEY 미설정 시 개발용 기본값으로 동작 (경고 로그 출력됨)
# 운영 배포 시 반드시 환경변수 APP_CRYPTO_KEY로 교체
app.crypto.key=${APP_CRYPTO_KEY:AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=}
# 자동매매 전체 차단 스위치 — true면 모든 KIS 주문 거부
app.trading.kill-switch=${TRADING_KILL_SWITCH:false}
# 승인 링크 HMAC 서명 키 (32바이트 Base64). 운영에선 환경변수로만.
app.approval.hmac-secret=${APPROVAL_HMAC_SECRET:dev-only-hmac-secret-replace-with-real-key=}
# 승인 링크 만료 시간(시간 단위)
app.approval.ttl-hours=24
# 사용자에게 보여지는 베이스 URL (이메일 링크용)
app.public-base-url=${APP_BASE_URL:http://localhost:5173}

# ───── Alpha-Helix Analytics (Python sidecar) ─────
app.analytics.base-url=${ANALYTICS_BASE_URL:http://localhost:8001}
app.analytics.internal-token=${ANALYTICS_INTERNAL_TOKEN:dev-internal-token-change-me}
app.analytics.timeout-sec=${ANALYTICS_TIMEOUT_SEC:30}

# Lean 엔진 (QuantConnect) 활성화 플래그.
# true 로 켜려면: analytics 사이드카 호스트에 Docker 설치 + quantconnect/lean:latest 이미지 pull.
# 미충족 시 false 유지 (호출 시 503 으로 즉시 거부).
app.lean.enabled=${LEAN_ENABLED:false}

# Claude Code 에이전트 (헤드리스 claude CLI 로 워크스페이스 코드 편집). 운영 기본 OFF.
# true 로 켜려면: 서버에 claude CLI(npm i -g @anthropic-ai/claude-code) + 인증(ANTHROPIC_API_KEY 또는 로그인) 필요.
# 임시 격리 디렉터리에서 허용툴 제한(Bash 없음)으로 실행. 미충족 시 호출 503.
app.claude.cli.enabled=${CLAUDE_CLI_ENABLED:false}
app.claude.cli.path=${CLAUDE_CLI_PATH:claude}
app.claude.cli.timeout-sec=${CLAUDE_CLI_TIMEOUT_SEC:180}

# Developer Studio + Claude BYOK 접근 allowlist (쉼표구분 이메일). 플랜과 무관하게 항상 허용.
# ⚠️ 반드시 서버 설정/env 로만 관리(프론트 하드코딩 금지 — M6 실명 PII 재발 방지).
# 운영: DEVELOPER_ALLOWLIST 환경변수. 로컬: application-local.properties(gitignore).
app.access.developer-allowlist=${DEVELOPER_ALLOWLIST:}

# Toss Payments (한국 PG). 운영 시 TOSS_SECRET_KEY 환경변수로 라이브 키 주입.
# 기본값은 토스 v2 결제위젯 docs 테스트 시크릿 키(test_gsk_docs_*)이며,
# 프론트의 v2 위젯 클라이언트 키(test_gck_docs_*)와 페어로 동작한다.
# v1 standard 키(test_sk_*/test_ck_*)는 v2 위젯과 호환 안되니 혼용 금지.
# 프론트 client key 는 frontend/.env 의 VITE_TOSS_CLIENT_KEY 참조.
tosspayments.secret-key=${TOSS_SECRET_KEY:test_sk_zXLkKEypNArWmo50nX3lmeaxYG5R}
tosspayments.api-base=https://api.tosspayments.com
# Webhook 시그니처(HMAC-SHA256) 검증용 보안키. 비어있으면 검증 skip(개발용).
# 운영에선 토스 콘솔 > 개발자 센터 > 웹훅에서 발급받아 TOSS_WEBHOOK_SECRET 으로 주입 필수.
tosspayments.webhook-secret=${TOSS_WEBHOOK_SECRET:}

# ───── GitHub OAuth ─────
github.client.id=${GITHUB_CLIENT_ID:}
github.client.secret=${GITHUB_CLIENT_SECRET:}

# ───── Flyway DB 마이그레이션 ─────
# 로컬(ddl-auto=update)은 비활성, 운영(ddl-auto=validate)은 활성화해서 스키마 버전 관리
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# baseline-version: from-scratch 배포는 backend/docs/schema_full_current.sql(현재 전체 스키마)을
#   먼저 import 한 뒤 기동한다. 그러면 Flyway 가 "기존 스키마 + 히스토리 없음" 을 감지해
#   현재 최신 버전으로 baseline 을 찍고(V1~V16 은 baseline 처리=실행 안 함) V17+ 만 적용한다.
#   (이미 flyway_schema_history 가 있는 기존 운영 DB 는 baseline-version 영향 없음.)
#   ⚠️ 신규 마이그레이션을 추가하면 이 값을 그 직전 버전으로 올리고 schema_full_current.sql 도 재생성할 것.
spring.flyway.baseline-version=16

# ───── Resilience4j (Analytics Circuit Breaker) ─────
resilience4j.circuitbreaker.instances.analytics.sliding-window-size=10
resilience4j.circuitbreaker.instances.analytics.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.analytics.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.analytics.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.analytics.register-health-indicator=true
resilience4j.retry.instances.analytics.max-attempts=3
resilience4j.retry.instances.analytics.wait-duration=2s
resilience4j.retry.instances.analytics.retry-exceptions=com.DevBridge.devbridge.domain.strategy.service.AnalyticsClient$AnalyticsException
resilience4j.retry.instances.analytics.ignore-exceptions=com.DevBridge.devbridge.domain.strategy.service.AnalyticsClient$AnalyticsException$ClientError

# ───── Rate Limiting (AI 채팅 보호) ─────
# Bucket4j 인메모리 기반. 운영에서는 Redis 연동 권장.
app.ratelimit.ai-chat.capacity=20
app.ratelimit.ai-chat.refill-tokens=20
app.ratelimit.ai-chat.refill-minutes=60
