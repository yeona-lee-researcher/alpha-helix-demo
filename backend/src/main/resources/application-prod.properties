# =====================================================================
# 운영 프로파일 - 활성화: --spring.profiles.active=prod 또는 SPRING_PROFILES_ACTIVE=prod
# 모든 시크릿은 환경변수로만 주입. fallback 없음 (env 누락 시 부팅 실패 = 의도된 동작)
# =====================================================================

# DB 자격증명 (env 필수)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:alphahelix_db}?serverTimezone=Asia/Seoul
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA: 운영에선 schema 자동 변형 금지, SQL 로그 비활성
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway: 운영에서만 활성화 — 스키마 버전 관리
spring.flyway.enabled=true

# JWT: env 필수 (default 제거 - 누락 시 부팅 실패)
app.jwt.secret=${JWT_SECRET}

# 암호화/서명 시크릿: env 필수 (default 제거 → 누락 시 부팅 실패).
# base application.properties 의 dev 기본값(공개됨)이 운영으로 새지 않도록 prod 에서 반드시 오버라이드.
#  - app.crypto.key            : KIS/Binance appsecret·시크릿 AES-GCM 암호화 키 (Base64 32바이트)
#  - app.approval.hmac-secret  : OrderProposal 승인링크 HMAC 서명키 (위조 시 주문승인 우회)
#  - app.analytics.internal-token : BE→Analytics 사이드카 내부 인증 토큰
app.crypto.key=${APP_CRYPTO_KEY}
app.approval.hmac-secret=${APPROVAL_HMAC_SECRET}
app.analytics.internal-token=${ANALYTICS_INTERNAL_TOKEN}

# Auth cookie: 운영은 HTTPS이므로 secure=true 강제. SameSite=Lax (cross-origin POST 차단).
app.cookie.secure=true
app.cookie.same-site=Lax

# Gemini / Stream Chat / Gmail: env 필수
gemini.api.key=${GEMINI_API_KEY}
stream.chat.api-key=${STREAM_CHAT_API_KEY}
stream.chat.api-secret=${STREAM_CHAT_API_SECRET}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# Actuator: 모든 엔드포인트 비공개 (필요 시 health만 화이트리스트)
management.endpoints.web.exposure.exclude=*
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# CORS 운영 origin (env에서 콤마구분으로 주입)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# 업로드 디렉터리도 env로 (절대경로 권장)
app.upload.dir=${UPLOAD_DIR:/var/devbridge/uploads}

# Toss Payments — 운영은 라이브 키 env 주입 필수. default 제거 → 누락 시 부팅 실패.
tosspayments.secret-key=${TOSS_SECRET_KEY}
tosspayments.webhook-secret=${TOSS_WEBHOOK_SECRET}
